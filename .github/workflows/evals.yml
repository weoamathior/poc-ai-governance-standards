# Thin caller: gate policy PRs on the regression corpus, run by the central engine.
# The harness + evaluator live in governance-ci (pinned @v1); the corpus lives here.
name: Standards Regression

on:
  pull_request:
    paths:
      - "standards/**"
      - "evaluator/**"
      - "evals/**"
  workflow_dispatch: {}

jobs:
  evals:
    uses: weoamathior/governance-ci/.github/workflows/standards-evals.yml@v1
    secrets: inherit
